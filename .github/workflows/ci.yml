name: CI

# Runs on every push to main + PRs. This is the gate that makes hands-off
# auto-merge safe: a PR only goes live once these jobs are green. The backend
# job imports server.py (the file the droplet runs verbatim) so a broken edit
# can't reach production; the frontend job runs the same `next build` Netlify
# uses to publish.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests + import smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r backend/requirements.txt pytest
      - name: Compile-check the live backend
        run: python -m py_compile backend/server.py backend/shipping_check.py
      - name: Run pytest (incl. server.py import smoke test)
        run: python -m pytest backend/tests -q

  frontend-types:
    name: Frontend type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
        working-directory: frontend
      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: frontend
      - name: Build (same as Netlify publish)
        run: npm run build
        working-directory: frontend

